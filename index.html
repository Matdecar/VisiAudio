<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visiaudio — empreinte sonore géométrique">
  <title>Visiaudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Canvas plein écran ── -->
  <canvas id="visualizer"></canvas>

  <!-- ── Fondu bas : canvas → carte ── -->
  <div id="canvas-fade" aria-hidden="true"></div>

  <!-- ── Drag & drop ── -->
  <div id="drag-overlay" hidden aria-hidden="true">
    <div class="drag-ring">Déposer ici</div>
  </div>

  <!-- ── État vide ── -->
  <div id="empty-hint" aria-hidden="true">
    <svg class="empty-glyph" viewBox="0 0 80 80" fill="none">
      <polygon points="40,5 73,22 73,58 40,75 7,58 7,22" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
      <polygon points="40,18 62,30 62,50 40,62 18,50 18,30" stroke="currentColor" stroke-width="0.6" stroke-linejoin="round" opacity="0.4"/>
      <circle cx="40" cy="40" r="5.5" stroke="currentColor" stroke-width="1" opacity="0.7"/>
    </svg>
    <p class="empty-text">Importez un fichier ou choisissez<br>un morceau dans la bibliothèque</p>
  </div>

  <!-- ── Chargement ── -->
  <div id="loading-overlay" hidden role="status" aria-live="polite">
    <div class="loading-ring"></div>
    <p id="loading-text">Chargement…</p>
  </div>

  <!-- ── Marque (haut gauche) ── -->
  <div id="brand-pill">
    <svg class="brand-hex" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <polygon points="9,1 17,5 17,13 9,17 1,13 1,5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      <circle cx="9" cy="9" r="2.2" fill="currentColor"/>
    </svg>
    <span class="brand-name">Visiaudio</span>
  </div>

  <!-- ── Carte de contrôles (bas, centrée) ── -->
  <div id="ctrl-card">

    <!-- Lecteur (masqué jusqu'au chargement) -->
    <div id="player-panel" hidden>
      <div class="player-row">
        <div class="cover-box">
          <img id="cover-img" alt="" hidden>
          <div id="cover-fallback" class="cover-fallback" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="10.5" stroke="currentColor" stroke-width="1"/>
              <circle cx="16" cy="16" r="3" stroke="currentColor" stroke-width="1"/>
              <line x1="16" y1="5.5" x2="16" y2="13" stroke="currentColor" stroke-width="1"/>
            </svg>
          </div>
        </div>
        <div class="player-meta">
          <div id="track-title" class="track-title">—</div>
          <div id="track-artist" class="track-artist"></div>
          <div id="attr-bar" class="attr-bar" hidden>
            <span id="footer-attribution"></span>
          </div>
        </div>
        <audio id="audio-player" preload="metadata"></audio>
        <div class="transport">
          <button id="play-btn" aria-label="Lecture / Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="scrubber">
            <div id="progress-bar" class="progress-track" role="slider" aria-label="Position de lecture" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-row">
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Barre de contrôles (toujours visible) -->
    <div class="ctrl-row">

      <label for="file-input" class="btn-import">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 10V2M8 2L5.5 4.5M8 2l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11.5v.5A2 2 0 004 14h8a2 2 0 002-2v-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Importer
      </label>
      <input type="file" id="file-input" accept="audio/*" hidden aria-label="Choisir un fichier audio">

      <div id="file-warning" class="file-warning" hidden>
        Serveur requis — <code>python -m http.server 8000</code>
      </div>

      <div class="sel-wrap">
        <select id="library-select" aria-label="Sélectionner un morceau">
          <option value="">Bibliothèque…</option>
        </select>
        <svg class="sel-chevron" viewBox="0 0 10 6" fill="none" aria-hidden="true">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="v-sep" aria-hidden="true"></div>

      <nav class="mode-nav" role="group" aria-label="Mode de visualisation">
        <button class="mode-btn" data-mode="spiral">Spirale</button>
        <button class="mode-btn" data-mode="onde">Onde</button>
        <button class="mode-btn active" data-mode="bloom">Bloom</button>
      </nav>

      <div class="v-sep" aria-hidden="true"></div>

      <button id="export-btn" class="btn-export" disabled>
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v9M8 11l-2.5-2.5M8 11l2.5-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11.5v.5A2 2 0 004 14h8a2 2 0 002-2v-.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        PNG
      </button>

    </div>
  </div>

  <div id="toast" role="alert" aria-live="assertive"></div>

  <script src="lib/jsmediatags.min.js"></script>
  <script src="js/audio-analysis.js"></script>
  <script src="js/cover-extract.js"></script>
  <script src="js/visual-engine.js"></script>
  <script src="js/library.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

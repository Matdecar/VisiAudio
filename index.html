<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visiaudio — empreinte sonore géométrique">
  <title>Visiaudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="layout">

    <!-- ── Canvas (gauche) ── -->
    <div id="canvas-area">
      <canvas id="visualizer"></canvas>

      <!-- Drag & drop overlay -->
      <div id="drag-overlay" hidden aria-hidden="true">
        <div class="drag-inner"><span>Déposer ici</span></div>
      </div>

      <!-- État vide -->
      <div id="empty-hint" aria-hidden="true">
        <div class="empty-glyph">
          <svg viewBox="0 0 64 64" fill="none">
            <polygon points="32,4 60,18 60,46 32,60 4,46 4,18" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
            <polygon points="32,14 50,24 50,40 32,50 14,40 14,24" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round" opacity="0.5"/>
            <circle cx="32" cy="32" r="5" stroke="currentColor" stroke-width="1" opacity="0.7"/>
          </svg>
        </div>
        <p class="empty-label">Importez un fichier ou choisissez<br>un morceau dans la bibliothèque</p>
      </div>

      <!-- Chargement -->
      <div id="loading-overlay" hidden role="status" aria-live="polite">
        <div class="loading-ring"></div>
        <p id="loading-text">Chargement…</p>
      </div>

      <!-- Attribution -->
      <div id="attr-bar" class="attr-bar" hidden>
        <span id="footer-attribution"></span>
      </div>
    </div>

    <!-- ── Panneau de contrôle (droite) ── -->
    <aside id="panel">

      <!-- En-tête -->
      <div class="panel-head">
        <div class="brand-name">Visiaudio</div>
        <div class="brand-tag">Empreinte sonore</div>
      </div>

      <!-- Import -->
      <div class="p-section">
        <label for="file-input" class="btn-import">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 13V4M10 4L7 7M10 4l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Importer un fichier
        </label>
        <input type="file" id="file-input" accept="audio/*" hidden aria-label="Choisir un fichier audio">
        <p class="format-hint">mp3 · wav · ogg · flac · m4a</p>
      </div>

      <!-- Séparateur -->
      <div class="panel-sep"><span>ou</span></div>

      <!-- Bibliothèque -->
      <div class="p-section">
        <div id="file-warning" class="file-warning" hidden>
          Serveur local requis. Dans le terminal du dossier du projet :<br>
          <code>python -m http.server 8000</code><br>
          puis ouvrir <code>http://localhost:8000</code>
        </div>
        <div class="select-wrap">
          <select id="library-select" aria-label="Sélectionner un morceau">
            <option value="">Bibliothèque…</option>
          </select>
          <svg class="select-chevron" viewBox="0 0 10 6" fill="none" aria-hidden="true">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Lecteur (masqué jusqu'au chargement) -->
      <div id="player-panel" class="p-player" hidden>
        <div class="player-cover-row">
          <div class="cover-box">
            <img id="cover-img" alt="" hidden>
            <div id="cover-fallback" class="cover-fallback" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1"/>
                <circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1"/>
                <line x1="12" y1="4" x2="12" y2="9.5" stroke="currentColor" stroke-width="1"/>
              </svg>
            </div>
          </div>
          <div class="player-meta">
            <div id="track-title" class="track-title">—</div>
            <div id="track-artist" class="track-artist"></div>
          </div>
        </div>
        <audio id="audio-player" preload="metadata"></audio>
        <div class="transport">
          <button id="play-btn" aria-label="Lecture / Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <div class="scrubber">
            <div id="progress-bar" class="progress-track" role="slider" aria-label="Position de lecture" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-row">
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Spacer -->
      <div class="p-spacer"></div>

      <!-- Mode -->
      <div class="mode-nav">
        <span class="mode-label">Mode</span>
        <div class="mode-btns">
          <button class="mode-btn" data-mode="spiral">Spirale</button>
          <button class="mode-btn" data-mode="onde">Onde</button>
          <button class="mode-btn active" data-mode="bloom">Bloom</button>
        </div>
      </div>

      <!-- Export -->
      <div class="panel-foot">
        <button id="export-btn" class="btn-export" disabled>
          Exporter en PNG
        </button>
      </div>

    </aside>
  </div>

  <!-- Toast -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- Scripts -->
  <script src="lib/jsmediatags.min.js"></script>
  <script src="js/audio-analysis.js"></script>
  <script src="js/cover-extract.js"></script>
  <script src="js/visual-engine.js"></script>
  <script src="js/library.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
